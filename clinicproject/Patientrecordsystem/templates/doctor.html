{% extends base_template %}

{% block content %}

<div class="card">
    <h2>Welcome Dr. {{ doctor.doctor_name }}</h2>
    <h3>Today's Appointments : {{ total }}</h3>
</div>

<br>

<table>
    <tr>
        <th>Patient</th>
        <th>Time</th>
        <th>Reason</th>
    </tr>

    {% for i in appointments %}
    <tr>
        <td>{{ i.patient_name }}</td>
        <td>{{ i.time_slot }}</td>
        <td>{{ i.reason_for_visit }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No appointments today.</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
