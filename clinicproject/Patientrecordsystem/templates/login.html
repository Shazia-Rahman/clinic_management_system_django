{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="/static/css/style.css ">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>User Login</h1>

        <form method="POST">

            {% csrf_token %}

            <label>Username</label>

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <label>Password</label>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit" class="login-btn" >

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
